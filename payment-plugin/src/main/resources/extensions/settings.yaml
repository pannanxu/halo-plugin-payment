apiVersion: v1alpha1
kind: Setting
metadata:
  name: payment-settings
spec:
  forms:
    - group: basic
      label: 基本设置
      formSchema:
        - $formkit: text
          label: 异步通知Token
          name: token
          value: 123456789qwertyuioasdfghjk
          help: "支付成功后回调通知时会校验此token是否一致"

