apiVersion: v1alpha1
kind: Setting
metadata:
  name: payment-settings
spec:
  forms:
    - group: basic
      label: 基本设置
      formSchema:
        - $formkit: checkbox
          help: "tmp checkbox"
          label: Tmp
          name: enable
          value: true


    - group: wechat
      label: 微信支付设置
      formSchema:
        - $formkit: text
          label: AppId
          name: AppId
        - $formkit: text
          label: 商户号
          name: merchantId
        - $formkit: text
          label: 商户API私钥
          name: privateKey
          help: "默认使用 RSA 字符串。如果以 file:// 开头则匹配路径，如：file:///opt/cert/apiclient_key.pem"
        - $formkit: text
          label: 商户证书序列号
          name: merchantSerialNumber
        - $formkit: text
          label: 商户APIV3密钥
          name: apiV3key
          

    - group: alipay
      label: 支付宝设置
      formSchema:
        - $formkit: text
          label: 网关地址
          name: serverUrl
          help: "线上：https://openapi.alipay.com/gateway.do 沙箱：https://openapi.alipaydev.com/gateway.do"
          value: "https://openapi.alipay.com/gateway.do"
        - $formkit: text
          label: AppId
          name: appId
          help: "开放平台上创建的应用的ID"
        - $formkit: radio
          label: 模式
          value: mode
          name: mode
          help: "pub：公钥模式；cert：证书模式"
          options:
            - label: 公钥模式
              value: pub
            - label: 证书模式
              value: cert
        - $formkit: text
          label: 商户私钥
          name: privateKey
          help: "pub：公钥模式；cert：证书模式"
        - $formkit: text
          label: 支付宝公钥
          name: alipayPublicKey
          help: "支付宝公钥字符串（公钥模式下设置，证书模式下无需设置）。file:// 开头则寻找本地路径"
          if: "$get(mode).value === pub"
        - $formkit: text
          label: 商户应用公钥证书
          name: appCert
          help: "商户应用公钥证书路径（证书模式下设置，公钥模式下无需设置）。file:// 开头则寻找本地路径"
          if: "$get(mode).value === cert"
        - $formkit: text
          label: 支付宝公钥证书
          name: alipayPublicCert
          help: "商户应用公钥证书路径（证书模式下设置，公钥模式下无需设置）。file:// 开头则寻找本地路径"
          if: "$get(mode).value === cert"
        - $formkit: text
          label: 支付宝根证书
          name: rootCert
          help: "商户应用公钥证书路径（证书模式下设置，公钥模式下无需设置）。file:// 开头则寻找本地路径"
          if: "$get(mode).value === cert"
